<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход и регистрация</title>
  <script type="module" src="js/auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
    <h1 class="text-2xl font-bold mb-6 text-center">Чат-приложение</h1>

    <!-- Вкладки -->
    <div class="flex mb-6 border-b">
      <button id="loginTab" class="px-4 py-2 flex-1 text-center bg-blue-500 text-white">Вход</button>
      <button id="registerTab" class="px-4 py-2 flex-1 text-center bg-gray-200 text-gray-700 hover:bg-gray-300">Регистрация</button>
    </div>

    <!-- Форма входа -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Логин</label>
        <input type="text" id="loginInput" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Пароль</label>
        <input type="password" id="passwordInput" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <button type="submit"
              class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
        Войти
      </button>
    </form>

    <!-- Форма регистрации -->
    <form id="registerForm" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700">Логин</label>
        <input type="text" id="regLoginInput" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="emailInput" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Пароль</label>
        <input type="password" id="regPasswordInput" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>
      <button type="submit"
              class="w-full bg-purple-500 text-white py-2 rounded hover:bg-purple-600 transition">
        Зарегистрироваться
      </button>
    </form>

    <p id="authError" class="text-red-500 text-sm mt-4 hidden"></p>
  </div>
</body>
</html>
